# NikaNewCrm - Production (ручной деплой)
# Запуск: docker compose up -d
# Остановка: docker compose down

services:
  web:
    build: .
    container_name: nikanewcrm-web
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DB_DRIVER=${DB_DRIVER:-sqlite}
      - DATABASE_URL=${DATABASE_URL:-}
      - DATABASE_PATH=/app/database/service_center.db
      - RATELIMIT_STORAGE_URI=${RATELIMIT_STORAGE_URI:-memory://}
      - TIMEZONE_OFFSET=${TIMEZONE_OFFSET:-3}
      - MAIL_SERVER=${MAIL_SERVER:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_DEFAULT_SENDER=${MAIL_DEFAULT_SENDER:-}
    volumes:
      - ./data/database:/app/database
      - ./data/logs:/app/logs
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: nikanewcrm-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: nikanewcrm-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-nikacrm}
      - POSTGRES_USER=${POSTGRES_USER:-nikacrm}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nikacrm} -d ${POSTGRES_DB:-nikacrm}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
