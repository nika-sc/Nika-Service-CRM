# NikaNewCrm — Docker Compose (каноническая конфигурация)
#
# Запуск из корня репозитория (рекомендуется):
#   docker compose up -d
# (корневой docker-compose.yml подключает этот файл через include)
#
# Явный вызов:
#   docker compose -f docker/docker-compose.yml up -d
#
# Пути к volume и nginx относительно каталога docker/

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: nikanewcrm-web
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DB_DRIVER=${DB_DRIVER:-postgres}
      - DATABASE_URL=${DATABASE_URL:-postgresql://nikacrm:change-me@postgres:5432/nikacrm}
      - DATABASE_PATH=/app/database/service_center.db
      - RATELIMIT_STORAGE_URI=${RATELIMIT_STORAGE_URI:-memory://}
      - TIMEZONE_OFFSET=${TIMEZONE_OFFSET:-3}
      - MAIL_SERVER=${MAIL_SERVER:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_DEFAULT_SENDER=${MAIL_DEFAULT_SENDER:-}
      - STAFF_CHAT_VAPID_PUBLIC_KEY=${STAFF_CHAT_VAPID_PUBLIC_KEY:-}
      - STAFF_CHAT_VAPID_PRIVATE_KEY=${STAFF_CHAT_VAPID_PRIVATE_KEY:-}
      - STAFF_CHAT_VAPID_CLAIM_EMAIL=${STAFF_CHAT_VAPID_CLAIM_EMAIL:-mailto:noreply@localhost}
      # Host allowlist / CSP / rate limits / Socket.IO — из .env на сервере (иначе в контейнер не попадают)
      - TRUSTED_HOSTS=${TRUSTED_HOSTS:-}
      - CSP_REPORT_ONLY=${CSP_REPORT_ONLY:-true}
      - CSP_REPORT_URI=${CSP_REPORT_URI:-}
      - CSP_ENFORCE_PATH_PREFIXES=${CSP_ENFORCE_PATH_PREFIXES:-}
      - WRITE_API_RATE_LIMIT_PER_MIN=${WRITE_API_RATE_LIMIT_PER_MIN:-120}
      - SOCKETIO_CORS_ALLOWED_ORIGINS=${SOCKETIO_CORS_ALLOWED_ORIGINS:-}
    volumes:
      - ../data/database:/app/database
      - ../data/logs:/app/logs
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: nikanewcrm-nginx
    restart: unless-stopped
    ports:
      # Публикуем только на localhost: внешний трафик идёт через host nginx :80/:443
      - "127.0.0.1:8080:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    container_name: nikanewcrm-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-nikacrm}
      - POSTGRES_USER=${POSTGRES_USER:-nikacrm}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
    # PG18+ официальный образ: один том на /var/lib/postgresql (не …/data)
    volumes:
      - postgres_data:/var/lib/postgresql
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nikacrm} -d ${POSTGRES_DB:-nikacrm}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
