# Upstream с keepalive — переиспользование соединений к приложению
upstream backend {
    server web:5000;
    keepalive 8;
}

# Сжатие ответов (HTML, CSS, JS, JSON) — быстрее загрузка в браузере
gzip on;
gzip_vary on;
gzip_min_length 256;
gzip_proxied any;
gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet, noimageindex" always;

    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # Отсекаем типовые шумовые сканы (секреты/чужие стеки) без проксирования в приложение.
    location ~* ^/(?:\.env|\.git|\.svn|\.hg|\.DS_Store|vendor/phpunit|phpunit|wp-admin|wp-login\.php|xmlrpc\.php|actuator|manager/html|containers/json) {
        access_log off;
        return 403;
    }

    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering on;
        proxy_buffer_size 4k;
    }
}
